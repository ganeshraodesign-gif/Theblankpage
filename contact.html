<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | THE BLANK</title>
    <meta name="description" content="Get in touch with The Blank Studio for all your branding, photography, and design needs in Ahmedabad, India.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,700&family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&family=DM+Sans:wght@400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Grid Guidelines -->
    <div class="grid-guidelines">
        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
    </div>

    <nav class="navbar scrolled">
        <a href="index.html" class="nav-logo">THE BLANK</a>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="pricing.html">Pricing</a></li>
            <li><a href="visual.html">Visual</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-right">
            <div class="currency-toggle">
                <button class="active" data-currency="inr">₹</button>
                <button data-currency="usd">$</button>
            </div>
            <button class="theme-btn" onclick="toggleTheme()">◐</button>
            <button class="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" onclick="toggleMenu()">Home</a>
        <a href="services.html" onclick="toggleMenu()">Services</a>
        <a href="pricing.html" onclick="toggleMenu()">Pricing</a>
        <a href="visual.html" onclick="toggleMenu()">Visual</a>
        <a href="about.html" onclick="toggleMenu()">About</a>
        <a href="contact.html" onclick="toggleMenu()">Contact</a>
    </div>

    <section class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-form fade-in">
                    <h2>Let's Create<br>Together</h2>
                    <form id="contactForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="name" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" name="phone" required placeholder="+91 xxxxx xxxxx">
                        </div>
                        <div class="form-group">
                            <label>Project Type</label>
                            <select name="projectType" required>
                                <option value="">Select project type</option>
                                <option value="logo">Logo Design</option>
                                <option value="branding">Brand Identity</option>
                                <option value="photography">Photography</option>
                                <option value="packaging">Packaging Design</option>
                                <option value="social">Social Media</option>
                                <option value="web">Website Design</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Budget Range</label>
                            <select name="budget" required>
                                <option value="">Select budget range</option>
                                <option value="0-5000">Under ₹5,000</option>
                                <option value="5000-10000">₹5,000 - ₹10,000</option>
                                <option value="10000-25000">₹10,000 - ₹25,000</option>
                                <option value="25000+">₹25,000+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea name="message" required placeholder="Tell us about your project..."></textarea>
                        </div>
                        <button type="button" class="submit-btn whatsapp-btn" onclick="sendToWhatsApp()">Send via WhatsApp</button>
                    </form>
                </div>
                <div class="contact-info fade-in">
                    <img src="websiteimage/contect.jpg" alt="Contact Image" style="margin-bottom: 64px; width: 100%; aspect-ratio: 4/3; object-fit: cover;">
                    <h3>Get In Touch</h3>
                    <div class="contact-details">
                        <p>Email: <a href="mailto:ganeshrao.design@gmail.com">ganeshrao.design@gmail.com</a></p>
                        <p>WhatsApp: <a href="https://wa.me/919714906783" target="_blank">+91 9714906783</a></p>
                        <p>Mobile: <a href="https://wa.me/919067832195" target="_blank">+91 9067832195</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-logo">THE BLANK</div>
        <p class="footer-copy">&copy; <span class="year">2026</span> The Blank Studio. All rights reserved.</p>
    </footer>

    

    <script>
        // Mobile Menu Toggle
        function toggleMenu() {
            document.querySelector('.hamburger').classList.toggle('active');
            document.querySelector('.mobile-menu').classList.toggle('active');
        }

        // Dark Mode Toggle
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Update year
        document.querySelectorAll('.year').forEach(function(el) {
            el.textContent = new Date().getFullYear();
        });

        // Custom Cursor
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', function(e) {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Currency Toggle
        const currencyBtns = document.querySelectorAll('.currency-toggle button');
        
        currencyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currencyBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                localStorage.setItem('currency', btn.dataset.currency);
            });
        });

        const savedCurrency = localStorage.getItem('currency') || 'inr';
        currencyBtns.forEach(btn => {
            if (btn.dataset.currency === savedCurrency) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        // Form Submit - WhatsApp
        function sendToWhatsApp() {
            const name = document.querySelector('input[name="name"]').value;
            const email = document.querySelector('input[name="email"]').value;
            const phone = document.querySelector('input[name="phone"]').value;
            const projectType = document.querySelector('select[name="projectType"]').value;
            const budget = document.querySelector('select[name="budget"]').value;
            const message = document.querySelector('textarea[name="message"]').value;
            
            if (!name || !email || !phone || !projectType || !message) {
                alert('Please fill in all required fields.');
                return;
            }
            
            const projectLabels = {
                'logo': 'Logo Design',
                'branding': 'Brand Identity',
                'photography': 'Photography',
                'packaging': 'Packaging Design',
                'social': 'Social Media',
                'web': 'Website Design',
                'other': 'Other'
            };
            
            const projectLabel = projectLabels[projectType] || projectType;
            const budgetLabel = budget || 'Not specified';
            
            const whatsappMessage = `Hi, I'm ${name}.%0A%0A*Interested in:* ${projectLabel}%0A*Budget:* ₹${budgetLabel}%0A*Phone:* ${phone}%0A*Email:* ${email}%0A%0A${message}`;
            
            const whatsappURL = `https://wa.me/919714906783?text=${whatsappMessage}`;
            window.open(whatsappURL, '_blank');
        }

        // Fade In Animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
